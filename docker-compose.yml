services:
  app:
    build: .
    ports:
      - '3000:3000'
    depends_on:
      - db
    volumes:
      - ./public/projection-images:/app/public/projection-images
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_PROJECTION_BUCKET: ${AWS_S3_PROJECTION_BUCKET}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL}
      PROJECTION_IMAGE_STORAGE: ${PROJECTION_IMAGE_STORAGE}
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticino_gala
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
